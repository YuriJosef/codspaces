<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ex 3 - Calculadora</title>
</head>
<body>
    <h2>Calculadora da Oficina</h2>
    <input type="number" id="num1" placeholder="Valor 1">
    <select id="operacao">
        <option value="+">Somar (+)</option>
        <option value="-">Subtrair (-)</option>
        <option value="*">Multiplicar (*)</option>
        <option value="/">Dividir (/)</option>
    </select>
    <input type="number" id="num2" placeholder="Valor 2">
    <button id="btnCalcular">Calcular</button>
    <p id="resultado"></p>

    <script>
        const btn = document.getElementById('btnCalcular');
        
        function calcular() {
            let n1 = parseFloat(document.getElementById('num1').value);
            let n2 = parseFloat(document.getElementById('num2').value);
            let op = document.getElementById('operacao').value;
            let res = 0;

            if (op === '+') res = n1 + n2;
            else if (op === '-') res = n1 - n2;
            else if (op === '*') res = n1 * n2;
            else if (op === '/') res = n1 / n2;

            document.getElementById('resultado').innerText = "Resultado: " + res;
        }

        btn.addEventListener('click', calcular);
    </script>
</body>
</html>
