<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ex 4 - Notas</title>
</head>
<body>
    <h2>Correção de Médias</h2>
    <input type="number" id="nota1" placeholder="Nota 1">
    <input type="number" id="nota2" placeholder="Nota 2">
    <button id="btnCorrigir">Calcular Média</button>
    <p id="status"></p>

    <script>
        const btn = document.getElementById('btnCorrigir');

        btn.addEventListener('click', function() {
            let n1 = parseFloat(document.getElementById('nota1').value);
            let n2 = parseFloat(document.getElementById('nota2').value);
            let media = (n1 + n2) / 2;
            let status = document.getElementById('status');

            if (media >= 7) {
                status.innerText = "Aprovado!";
                status.style.color = "green";
            } else if (media >= 5) {
                status.innerText = "Recuperação";
                status.style.color = "orange";
            } else {
                status.innerText = "Reprovado";
                status.style.color = "red";
            }
        });
    </script>
</body>
</html>
